<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI뭐써? — 미리보기</title>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucid Icons (Optional but used in many modern designs) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // code.html의 내용을 바탕으로 구성된 미리보기 코드
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- 데이터 섹션 (code.html에서 추출) ---
        const NAV_ITEMS = [
          { id: "ranking", label: "랭킹", icon: "🏆" },
          { id: "directory", label: "도구 디렉토리", icon: "📂" },
          { id: "community", label: "커뮤니티", icon: "💬" },
          { id: "gallery", label: "갤러리", icon: "🖼️" },
          { id: "prompt", label: "프롬프트", icon: "✨" },
          { id: "news", label: "뉴스", icon: "📰" },
          { id: "games", label: "AI 게임", icon: "🎮" },
        ];

        const TOOLS_DATA = [
          { id: 1, cat: "text", icon: "🤖", name: "ChatGPT", desc: "OpenAI의 대화형 AI. 업무 전반에 활용되는 AI의 대명사.", score: 99, change: 1.2 },
          { id: 2, cat: "image", icon: "🎨", name: "Midjourney", desc: "텍스트 프롬프트로 영화 같은 이미지를 만드는 AI.", score: 98, change: 2.1 },
          { id: 3, cat: "code", icon: "💻", name: "GitHub Copilot", desc: "개발 생산성을 극대화하는 AI 코딩 어시스턴트.", score: 96, change: 0.8 },
          { id: 4, cat: "text", icon: "🧠", name: "Claude", desc: "Anthropic의 창의적 글쓰기와 요약에 능한 AI.", score: 94, change: 5.3 },
          { id: 5, cat: "code", icon: "🔧", name: "Cursor", desc: "AI 기반 차세대 코드 에디터.", score: 89, change: 8.7 },
        ];

        // --- 단순화된 메인 앱 컴포넌트 ---
        function App() {
            const [theme, setTheme] = useState('light');
            
            const layoutStyle = {
                background: theme === 'light' ? '#f0f9ff' : '#0f1420',
                color: theme === 'light' ? '#0f172a' : '#e8ecf3',
                minHeight: '100vh',
                transition: 'all 0.3s ease'
            };

            return (
                <div style={layoutStyle}>
                    <header style={{ 
                        padding: '1rem 2rem', 
                        display: 'flex', 
                        justifyContent: 'space-between', 
                        alignItems: 'center',
                        borderBottom: '1px solid rgba(0,0,0,0.1)',
                        backdropFilter: 'blur(10px)',
                        position: 'sticky',
                        top: 0,
                        background: 'rgba(255,255,255,0.8)'
                    }}>
                        <div style={{ fontSize: '1.5rem', fontWeight: 800, color: '#6366f1' }}>AI뭐써?</div>
                        <button onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')} style={{
                            padding: '8px 16px', borderRadius: '20px', border: '1px solid #ccc', cursor: 'pointer'
                        }}>
                            {theme === 'light' ? '🌙 다크모드' : '☀️ 라이트모드'}
                        </button>
                    </header>

                    <main style={{ padding: '3rem 2rem', maxWidth: '1200px', margin: '0 auto' }}>
                        <div style={{ textAlign: 'center', marginBottom: '4rem' }}>
                            <h1 style={{ fontSize: '3rem', marginBottom: '1rem' }}>AI 도구를 인기 순으로</h1>
                            <p style={{ opacity: 0.7 }}>실제 트렌드 기반 AI 도구 랭킹 사이트입니다.</p>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: '2rem' }}>
                            {TOOLS_DATA.map(tool => (
                                <div key={tool.id} style={{
                                    background: theme === 'light' ? '#fff' : '#1a2235',
                                    padding: '1.5rem',
                                    borderRadius: '16px',
                                    boxShadow: '0 4px 6px rgba(0,0,0,0.05)',
                                    border: '1px solid rgba(0,0,0,0.05)'
                                }}>
                                    <div style={{ fontSize: '2rem', marginBottom: '1rem' }}>{tool.icon}</div>
                                    <h3 style={{ margin: '0 0 0.5rem 0' }}>{tool.name}</h3>
                                    <p style={{ fontSize: '0.9rem', opacity: 0.8, height: '3em', overflow: 'hidden' }}>{tool.desc}</p>
                                    <div style={{ marginTop: '1rem', fontWeight: 700, color: '#6366f1' }}>점수: {tool.score}</div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
