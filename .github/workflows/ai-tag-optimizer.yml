name: 🤖 AI 태그 최적화 엔진 (수동 실행)

on:
  workflow_dispatch:

jobs:
  run-tag-optimizer:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: 🤖 핵심 태그(3개) 자동 추출 및 정합성 클리닝
        run: node scripts/update_tags_cleanup.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 🔄 변경된 태그를 public/scores.json 에 동기화
        run: node scripts/update_ranking.js

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git stash || echo "No changes to stash"
          git pull --rebase origin main
          git stash pop || echo "No changes to pop"
          
          git add .
          if ! git diff --staged --quiet; then
            COMMIT_MSG="chore: AI 태그 최적화 완료 [$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')]"
            git commit -m "$COMMIT_MSG"
            git push origin main
          else
            echo "변경된 데이터가 없어 푸시를 생략합니다."
          fi
