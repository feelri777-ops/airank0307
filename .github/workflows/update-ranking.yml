name: 랭킹 자동 갱신 (매주 월요일 새벽 3시)

on:
  schedule:
    - cron: '0 18 * * 0'  # 매주 월요일 새벽 3시 KST (UTC 일요일 18:00)
  workflow_dispatch:

jobs:
  update-ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install



      - name: 🤖 AI 랭킹 에이전트 (제안 생성 → 어드민 컨펌 대기)
        run: node scripts/ranking_agent.js
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 생성된 데이터들을 잠시 보관 (Stash)
          git add .
          git stash
          
          # 2. 원격의 최신 변경사항을 가져와서 합침 (Rebase)
          git pull --rebase origin main
          
          # 3. 보관했던 데이터들을 다시 꺼냄
          git stash pop || echo "No changes to pop"
          
          # 4. 최종 변경 확인 및 KST 날짜로 커밋/푸시
          git add .
          if ! git diff --staged --quiet; then
            COMMIT_MSG="chore: 랭킹 자동 갱신 [$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')]"
            git commit -m "$COMMIT_MSG"
            git push origin main
          else
            echo "변경된 데이터가 없어 푸시를 생략합니다."
          fi
