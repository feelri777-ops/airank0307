name: 랭킹 & 유튜브 자동 갱신 (매일 새벽 3시)

on:
  schedule:
    - cron: '0 18 * * *'  # 매일 새벽 3시 KST (UTC 18:00)
  workflow_dispatch:

jobs:
  update-ranking:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: 랭킹 점수 갱신
        run: node scripts/update_ranking.js
        env:
          OPR_API_KEY: ${{ secrets.OPR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          XPOZ_API_KEY: ${{ secrets.XPOZ_API_KEY }}

      - name: 유튜브 영상 수집
        run: node scripts/fetch-youtube.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 원격의 최신 변경사항(스크립트 수정본 등)을 먼저 가져옴
          git fetch origin main
          git rebase origin/main
          
          # 2. 새로 생성된 데이터들을 모두 스테이징
          git add .
          
          # 3. 변경사항이 있으면 커밋하고 푸시 (충돌 방지를 위해 force push 또는 rebase 후 push)
          if ! git diff --staged --quiet; then
            git commit -m "chore: 랭킹 & 유튜브 자동 갱신 [$(date '+%Y-%m-%d %H:%M UTC')]"
            git push origin main
          else
            echo "변경사항이 없습니다."
          fi
