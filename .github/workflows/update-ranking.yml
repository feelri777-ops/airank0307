name: 랭킹 자동 갱신 (매주 월요일 새벽 3시)

on:
  schedule:
    - cron: '0 18 * * 0'  # 매주 월요일 새벽 3시 KST (UTC 일요일 18:00)
  workflow_dispatch:

jobs:
  update-ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: 랭킹 점수 갱신
        run: node scripts/update_ranking.js
        env:
          OPR_API_KEY: ${{ secrets.OPR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_CLIENT_ID_2: ${{ secrets.NAVER_CLIENT_ID_2 }}
          NAVER_CLIENT_SECRET_2: ${{ secrets.NAVER_CLIENT_SECRET_2 }}
          XPOZ_API_KEY: ${{ secrets.XPOZ_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Firestore 점수 동기화
        run: node scripts/sync_tools_js.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 100위 컷오프 및 수동 랭킹 적용
        run: node scripts/rebalance_ranking.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 도구 정보 및 정합성 자동 점검 (AI Agent)
        run: node scripts/tool_scout_agent.js
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 생성된 데이터들을 잠시 보관 (Stash)
          git add .
          git stash
          
          # 2. 원격의 최신 변경사항을 가져와서 합침 (Rebase)
          git pull --rebase origin main
          
          # 3. 보관했던 데이터들을 다시 꺼냄
          git stash pop || echo "No changes to pop"
          
          # 4. 최종 변경 확인 및 KST 날짜로 커밋/푸시
          git add .
          if ! git diff --staged --quiet; then
            COMMIT_MSG="chore: 랭킹 자동 갱신 [$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')]"
            git commit -m "$COMMIT_MSG"
            git push origin main
          else
            echo "변경된 데이터가 없어 푸시를 생략합니다."
          fi
