name: 유튜브 자동 갱신 (매일 새벽 4시)

on:
  schedule:
    - cron: '0 19 * * *'  # 매일 새벽 4시 KST (UTC 19:00)
  workflow_dispatch:

jobs:
  update-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: 유튜브 영상 수집
        run: node scripts/fetch-youtube.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 생성된 데이터들을 잠시 보관 (Stash)
          git add .
          git stash
          
          # 2. 원격의 최신 변경사항을 가져와서 합침 (Rebase)
          git pull --rebase origin main
          
          # 3. 보관했던 데이터들을 다시 꺼냄
          git stash pop || echo "No changes to pop"
          
          # 4. 최종 변경 확인 및 KST 날짜로 커밋/푸시
          git add .
          if ! git diff --staged --quiet; then
            COMMIT_MSG="chore: 유튜브 자동 갱신 [$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')]"
            git commit -m "$COMMIT_MSG"
            git push origin main
          else
            echo "변경된 데이터가 없어 푸시를 생략합니다."
          fi
