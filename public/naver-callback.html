<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>네이버 로그인 중...</title>
</head>
<body>
  <div style="text-align: center; padding: 50px; font-family: sans-serif;">
    <p>네이버 로그인 처리 중...</p>
  </div>

  <script>
    // URL Fragment에서 access_token 추출
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');

    if (accessToken && window.opener) {
      // 부모 창으로 토큰 전달
      window.opener.postMessage({
        type: 'NAVER_TOKEN',
        token: accessToken
      }, window.location.origin);

      // 팝업 닫기
      window.close();
    } else {
      document.body.innerHTML = '<div style="text-align: center; padding: 50px; font-family: sans-serif;"><p style="color: red;">로그인에 실패했습니다.</p></div>';
    }
  </script>
</body>
</html>
